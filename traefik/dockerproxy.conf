# nginx shim in front of the Docker socket.
#
# Why this exists: OrbStack's Docker daemon rejects API requests below v1.40
# (returns HTTP 400 for /v1.24/...). Traefik's embedded Docker client bootstraps
# version negotiation with a hardcoded /v1.24/version call, which OrbStack refuses,
# so negotiation never completes and Traefik stays pinned at 1.24 forever.
#
# This shim rewrites the legacy /v1.24/ prefix to a supported version so the
# bootstrap call succeeds; Traefik then negotiates up to a modern version on its own.
# workers run as root so they can connect to the root-owned docker socket
user root;

events {}

http {
    upstream docker {
        server unix:/var/run/docker.sock;
    }

    server {
        listen 2375;

        location / {
            rewrite ^/v1\.24/(.*)$ /v1.44/$1 break;
            proxy_pass http://docker;
            proxy_set_header Host localhost;
        }
    }
}
