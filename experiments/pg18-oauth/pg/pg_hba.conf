# Spike pg_hba: superuser via trust (admin/init), everyone else via OAuth.
# OAuth clients connect as the DB role they want (user=db_readonly) and present a
# Keycloak bearer; kc_validator asks Keycloak whether that user may assume the role.
# TYPE  DATABASE  USER      ADDRESS       METHOD
local   all       all                     trust
host    all       postgres  0.0.0.0/0     trust
host    all       all       0.0.0.0/0     oauth  issuer="https://keycloak.pg.test:8443/realms/pgoauth"  scope=""  validator="kc_validator"  delegate_ident_mapping=1
